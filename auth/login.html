<!doctype html>

<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#93000a",
              "tertiary-fixed": "#b8eaff",
              "on-tertiary-fixed": "#001f28",
              background: "#fff8f4",
              "surface-container-low": "#fff1e5",
              "secondary-container": "#e8e3cd",
              "on-surface": "#211a13",
              "surface-container-highest": "#eee0d4",
              "on-tertiary-container": "#00576d",
              "surface-bright": "#fff8f4",
              "on-secondary-container": "#686554",
              "tertiary-fixed-dim": "#58d5fe",
              "tertiary-container": "#52d0f9",
              "on-surface-variant": "#524535",
              "surface-variant": "#eee0d4",
              "outline-variant": "#d6c3b0",
              tertiary: "#006780",
              "surface-container": "#f9ecdf",
              "surface-container-high": "#f3e6da",
              "secondary-fixed": "#e8e3cd",
              "primary-fixed": "#ffddb6",
              "on-tertiary-fixed-variant": "#004d61",
              outline: "#847463",
              "on-tertiary": "#ffffff",
              "on-error": "#ffffff",
              primary: "#845400",
              "on-primary-container": "#704700",
              "on-background": "#211a13",
              "inverse-primary": "#ffb95a",
              "on-primary-fixed-variant": "#643f00",
              surface: "#fff8f4",
              "primary-container": "#ffb347",
              "on-primary": "#ffffff",
              "inverse-surface": "#372f27",
              "on-secondary": "#ffffff",
              "primary-fixed-dim": "#ffb95a",
              "on-primary-fixed": "#2a1800",
              secondary: "#625f4e",
              "error-container": "#ffdad6",
              "secondary-fixed-dim": "#ccc7b2",
              "surface-dim": "#e5d8cc",
              "inverse-on-surface": "#fceee2",
              error: "#ba1a1a",
              "on-secondary-fixed-variant": "#4a4737",
              "on-secondary-fixed": "#1e1c0f",
              "surface-tint": "#845400",
              "surface-container-lowest": "#ffffff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "margin-mobile": "16px",
              lg: "24px",
              unit: "4px",
              xl: "40px",
              "container-max": "1200px",
              md: "16px",
              sm: "8px",
              xs: "4px",
              gutter: "24px",
            },
            fontFamily: {
              "headline-md": ["Quicksand"],
              "headline-lg-mobile": ["Quicksand"],
              "headline-xl": ["Quicksand"],
              "label-sm": ["Plus Jakarta Sans"],
              "label-md": ["Plus Jakarta Sans"],
              "headline-lg": ["Quicksand"],
              "body-md": ["Plus Jakarta Sans"],
              "body-lg": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "headline-lg-mobile": [
                "28px",
                { lineHeight: "36px", fontWeight: "700" },
              ],
              "headline-xl": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "label-sm": ["12px", { lineHeight: "16px", fontWeight: "700" }],
              "label-md": [
                "14px",
                {
                  lineHeight: "20px",
                  letterSpacing: "0.01em",
                  fontWeight: "600",
                },
              ],
              "headline-lg": [
                "32px",
                { lineHeight: "40px", fontWeight: "700" },
              ],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #f5f5f5; /* Pastel Grey background per brand instructions */
        font-family: "Quicksand", sans-serif;
      }
      .tinted-shadow {
        box-shadow: 0 20px 30px -10px rgba(132, 84, 0, 0.08);
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-md">
    <main class="w-full max-w-[440px]">
      <!-- Login Card -->
      <div
        class="bg-surface-container-lowest rounded-[32px] p-xl tinted-shadow border border-outline-variant/30 relative overflow-hidden"
      >
        <!-- Brand Identity Anchor -->
        <div class="flex flex-col items-center mb-xl">
          <div class="mb-md">
            <span
              class="material-symbols-outlined text-primary text-[48px]"
              data-icon="pets"
              >pets</span
            >
          </div>
          <h1
            class="font-headline-lg text-headline-lg text-primary tracking-tight"
          >
            Xám Pet Shop
          </h1>
          <p class="font-body-md text-body-md text-on-surface-variant mt-xs">
            Chào mừng bạn quay trở lại
          </p>
        </div>
        <form class="space-y-lg">
          <!-- Email Input Group -->
          <div class="space-y-xs">
            <label
              class="font-label-md text-label-md text-on-surface ml-unit"
              for="email"
              >Email của bạn</label
            >
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors"
              >
                <span class="material-symbols-outlined" data-icon="mail"
                  >mail</span
                >
              </div>
              <input
                class="w-full pl-[48px] pr-md py-md bg-surface-container-low border-none rounded-xl font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-all duration-300"
                id="email"
                placeholder="nampham050723@gmail.com"
                type="email"
              />
            </div>
          </div>
          <!-- Password Input Group -->
          <div class="space-y-xs">
            <label
              class="font-label-md text-label-md text-on-surface ml-unit"
              for="password"
              >Mật khẩu</label
            >
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors"
              >
                <span class="material-symbols-outlined" data-icon="lock"
                  >lock</span
                >
              </div>
              <input
                class="w-full pl-[48px] pr-md py-md bg-surface-container-low border-none rounded-xl font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-all duration-300"
                id="password"
                placeholder="••••••••"
                type="password"
              />
            </div>
          </div>
          <!-- Utilities Row -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-sm cursor-pointer group">
              <div class="relative">
                <input class="peer hidden" type="checkbox" />
                <div
                  class="w-5 h-5 rounded-md border-2 border-outline-variant peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center"
                >
                  <span
                    class="material-symbols-outlined text-white text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity"
                    data-icon="check"
                    style="font-variation-settings: &quot;wght&quot; 700"
                    >check</span
                  >
                </div>
              </div>
              <span
                class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors"
                >Ghi nhớ tôi</span
              >
            </label>
            <a
              class="font-label-md text-label-md text-primary hover:underline transition-all"
              href="#"
              >Quên mật khẩu?</a
            >
          </div>
          <!-- Submit Button -->
          <button
            class="w-full py-md bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-full shadow-md hover:scale-[1.03] active:scale-95 transition-all duration-200 mt-md"
            type="submit"
          >
            Đăng nhập
          </button>
        </form>
        <!-- Social/Register Divider -->
        <div class="mt-xl pt-lg border-t border-outline-variant/30 text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            Chưa có tài khoản?
            <a class="text-primary font-bold hover:underline" href="#"
              >Đăng ký ngay</a
            >
          </p>
        </div>
      </div>
      <!-- Decorative Background Illustration Suggestion (CSS based) -->
      <div
        class="mt-lg flex justify-center items-center gap-md opacity-40 grayscale hover:grayscale-0 transition-all duration-500"
      >
        <img
          alt=""
          class="w-12 h-12 rounded-full border-2 border-white shadow-sm"
          data-alt="A close-up portrait of a serene grey cat with striking green eyes resting in a sunlit, minimalist room. The lighting is high-key and soft, creating a gentle and cozy atmosphere that aligns with the premium cat care brand's identity. The background consists of soft white and pastel grey textures, emphasizing a clean and modern aesthetic that conveys dependable and observant care."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBExhWDrcRPHZLy_-SMpVypVCST7RJHW5EJm_-61dpCnTgp3-hKa6zgBsqkI14FQAUcJLpU4mj6adA0nWxjmoHsX4B9JDIsnX2SWtxjuzrIwmxHIjNTYZDv9t4DTZcT66X0n3RH1Gp-40U53pHOSAPAas4h5hGqq4U2V28uBKJVH7FLg1OIs8vitdwERp79qTlTagiTPuXDF_FCpy5uzuWZ54t5l0yRJ7j8alRFls7gZ6FUgptEaI-d-fBsNzrmFTHxz0SfFxc-o3I"
        />
        <img
          alt=""
          class="w-12 h-12 rounded-full border-2 border-white shadow-sm"
          data-alt="A beautiful ginger cat stretching comfortably on a plush cream-colored rug in a bright, modern living space. The scene is bathed in warm, diffused natural light, highlighting the soft minimalist design of the interior. The color palette is dominated by whites, light oranges, and soft greys, reflecting a calm and competent domestic setting focused on cat well-being."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYIGUlv8WgWeHjw7dIxx5FGcGeyvfjoxWwduttiN6DYzpLLNfNI4MlCF6vFPa2Qz9Sft2-9-itDj-WdQKg7ubaeMcLqho4PVJJTVqTOAWiiSxyzCV_fa4xHzxonyBCPYImlEnnAXtjFseRdUPT4CyRAX_YDISTSnUArUYK02nPhLcvziw-9lL-xjTR9cAgbvsIWwZpo8ElOTj9Rad3segZhR8nbN2cN67dOmscDBxL64uiBRRMfPiaDr7dNd284nNK3Q_RjH5yEUw"
        />
      </div>
    </main>
    <!-- Footer Identity from JSON -->
    <footer
      class="fixed bottom-0 left-0 w-full py-md px-lg flex justify-center pointer-events-none"
    >
      <p class="font-label-sm text-label-sm text-on-surface-variant/60">
        © 2026 Xám Pet Shop. All rights reserved.
      </p>
    </footer>
  </body>
</html>
